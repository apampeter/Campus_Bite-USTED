<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="stylesheet" href="css/styling.css">
    <script src="js/script.js"></script>
</head>

<body>

    <header class="header">
        <div class="logo">Campus Bites</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="order.html">Order</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <h2 class="section-title">Place Your Order</h2>

    <div class="order">

        <form  class="order-form" onsubmit="orderMessage()">

             <input type="text" id="name" placeholder="Your Name" required>

            <input type="text" placeholder="Phone Number" required>

            <select  id="food" required>
                <option value="">Select Food</option>
                <option>Jollof Rice</option>
                <option>Fried Rice</option>
                <option>Banku & Tilapia</option>
                <option>Waakye</option>
            </select>

            <input id="quantity" type="number" placeholder="Quantity" required>

            <textarea placeholder="Delivery Location" required></textarea>

            <button type="submit">Submit Order</button>

        </form>
    </div>


    <footer>
        <p>© 2026 Campus Bites</p>
    </footer>

</body>
</html>
